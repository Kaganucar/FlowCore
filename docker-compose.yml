services:
  db:
    image: postgres:16
    container_name: flowcore-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: flowcore_db
    ports:
      - "5433:5432"
    volumes:
      - flowcore_db_data:/var/lib/postgresql/data

volumes:
  flowcore_db_data: